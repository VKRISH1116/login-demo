spring.datasource.url=jdbc:postgresql://localhost:5433/login_demo
spring.datasource.username=login
spring.datasource.password=login_dev_pw

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT signing secret (dev only — override with an env var in production)
app.jwt.secret=this-is-a-dev-only-jwt-secret-please-change-in-production-0123456789
# Token lifetime: 15 minutes, in milliseconds
app.jwt.expiration-ms=900000