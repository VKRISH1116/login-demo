# ── Datasource ──────────────────────────────────────────
# Non-secret defaults are fine for local dev; the PASSWORD must come from the
# environment (never commit it). Override any of these with env vars in prod.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/login_demo}
spring.datasource.username=${DB_USERNAME:login}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ─────────────────────────────────────────────────
# Signing secret is REQUIRED via env var — the app won't start without it.
# Must be at least 32 bytes (HS256) / 64 bytes for HS512. Never commit a real one.
app.jwt.secret=${JWT_SECRET}
# Token lifetime in milliseconds (default: 15 minutes).
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
